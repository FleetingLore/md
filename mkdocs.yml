site_name: 电子技术基础  模拟部分
site_url: https://fleetinglore.github.io/md

# 在此处指定目录
nav:
  - example: index.md

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - toc.integrate

extra_css:
  - stylesheets/extra.css

repo_url: https://github.com/fleetinglore/md
repo_name: fleetinglore/md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.emoji # 可选：支持表情符号
  - footnotes # 可选：支持脚注

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
